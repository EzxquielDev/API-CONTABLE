<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">  
    <title>Login Odoo</title>
</head>
<body class="login-body">

    <div class="login-wrapper">
        <main class="login-card">

          <div class="cargando-consulta" id="cargando" hidden role="status" aria-live="polite">
            <div class="cargando-contenido">
              <span class="indicador-carga" aria-hidden="true"></span>
              <strong id="mensajeCargando">Validando credenciales…</strong>
              <span>Estamos verificando el acceso en Odoo.</span>
            </div>
          </div>

          <header class="login-header">
            <p class="login-overline">Seguridad</p>
            <h1>Login Odoo</h1>
            <p>Ingresa tu correo y contraseña de Odoo para que la consulta funcione.</p>
          </header>

          <form id="formLoginOdoo" autocomplete="off" class="login-form">
            
            <div class="login-form-group">
                <label for="odoo_user">Correo de Odoo</label>
                <input
                  id="odoo_user"
                  name="odoo_user"
                  type="email"
                  required
                  placeholder="correo@empresa.com"
                />
            </div>

            <div class="login-form-group">
                <label for="odoo_password">Contraseña de Odoo</label>
                <input
                  id="odoo_password"
                  name="odoo_password"
                  type="password"
                  required
                />
            </div>

            <div class="login-submit-container">
              <button type="submit" class="login-btn">
                Entrar
              </button>
            </div>

            <p id="estado" class="login-status" aria-live="polite"></p>
          </form>

        </main>
    </div>

<script>
(() => {
  const storageKey = {
    user: 'odoo_login_user',
    pass: 'odoo_login_password',
    verified: 'odoo_login_verified'
  };

  const form = document.getElementById('formLoginOdoo');
  const userEl = document.getElementById('odoo_user');
  const passEl = document.getElementById('odoo_password');
  const estadoEl = document.getElementById('estado');
  const cargando = document.getElementById('cargando');

  const setCargando = (v) => {
    cargando.hidden = !v;
  };

  async function verificar() {
    const payload = {
      odoo_user: userEl.value.trim(),
      odoo_password: passEl.value
    };

    setCargando(true);
    estadoEl.textContent = '';

    try {
      const resp = await fetch('/api/odoo/verify', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-API-Key': '{{ api_key }}'
        },
        body: JSON.stringify(payload)
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data.error || 'Credenciales inválidas.');
      }

      localStorage.setItem(storageKey.user, payload.odoo_user);
      localStorage.setItem(storageKey.pass, payload.odoo_password);
      localStorage.setItem(storageKey.verified, '1');

      estadoEl.textContent = 'Credenciales verificadas correctamente.';
      estadoEl.style.color = '#3c6e47';

      const next = new URLSearchParams(window.location.search).get('next') || '/entradas-productos';
      window.location.href = next;

    } catch (e) {
      estadoEl.textContent = e.message;
      estadoEl.style.color = '#b00020';
      localStorage.removeItem(storageKey.verified);
    } finally {
      setCargando(false);
    }
  }

  form.addEventListener('submit', (ev) => {
    ev.preventDefault();
    verificar();
  });
})();
</script>
</body>
</html>
